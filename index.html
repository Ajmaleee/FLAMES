<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Secure FLAMES Test</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#ffeef5;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      margin:0;
    }

    .card{
      background:white;
      padding:30px;
      border-radius:20px;
      width:350px;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
    }

    h1{
      text-align:center;
      color:#ff4081;
    }

    input{
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:10px;
      border:1px solid #ddd;
      box-sizing:border-box;
      font-size:16px;
    }

    button{
      width:100%;
      padding:14px;
      margin-top:15px;
      border:none;
      border-radius:12px;
      background:#ff4081;
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
    }

    button:hover{
      opacity:0.9;
    }

    #result{
      margin-top:20px;
      text-align:center;
      font-size:22px;
      font-weight:bold;
      color:#ff4081;
    }

    #status{
      margin-top:10px;
      text-align:center;
      font-size:13px;
      color:#666;
    }
  </style>
</head>
<body>

<div class="card">

  <h1>💕 FLAMES</h1>

  <input type="text" id="user-name" placeholder="Your Name" maxlength="40"/>
  <input type="text" id="crush-name" placeholder="Crush Name" maxlength="40"/>

  <button id="calc-btn">
    Calculate
  </button>

  <div id="result"></div>
  <div id="status"></div>

</div>

<script type="module">

/* =========================
   FIREBASE IMPORTS
========================= */

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  serverTimestamp
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

import {
  getAuth,
  signInAnonymously,
  onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

/* =========================
   FIREBASE CONFIG
========================= */

const firebaseConfig = {

  apiKey: "AIzaSyAoQEe3TtdYm6v6rs8OFhGOzWxny08iWJg",

  authDomain: "flames-72549.firebaseapp.com",

  projectId: "flames-72549",

  storageBucket: "flames-72549.firebasestorage.app",

  messagingSenderId: "581723675375",

  appId: "1:581723675375:web:01388538a58eb2c10a591a",

  measurementId: "G-2E0V3CF2E0"

};

/* =========================
   INIT
========================= */

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

/* =========================
   AUTH
========================= */

let currentUser = null;

onAuthStateChanged(auth, (user) => {

  currentUser = user;

});

async function ensureAuth() {

  if (auth.currentUser) {
    return auth.currentUser;
  }

  try {

    const cred = await signInAnonymously(auth);

    return cred.user;

  } catch (err) {

    console.error(err);

    return null;

  }
}

/* =========================
   BASIC RATE LIMIT
========================= */

const WRITE_COOLDOWN_MS = 10000;

function canSubmitNow() {

  const last = localStorage.getItem("lastSubmissionTime");

  if (!last) return true;

  return (Date.now() - Number(last)) > WRITE_COOLDOWN_MS;
}

function markSubmissionTime() {

  localStorage.setItem(
    "lastSubmissionTime",
    Date.now()
  );
}

/* =========================
   FLAMES LOGIC
========================= */

function calculateFLAMES(name1, name2) {

  let a = name1.toLowerCase().replace(/\s/g, "");

  let b = name2.toLowerCase().replace(/\s/g, "");

  let arr1 = a.split("");

  let arr2 = b.split("");

  for (let i = 0; i < arr1.length; i++) {

    const idx = arr2.indexOf(arr1[i]);

    if (idx !== -1) {

      arr1[i] = null;

      arr2[idx] = null;
    }
  }

  const count =
    arr1.filter(Boolean).length +
    arr2.filter(Boolean).length;

  let flames = ["F","L","A","M","E","S"];

  let index = 0;

  while (flames.length > 1) {

    index = (index + count - 1) % flames.length;

    flames.splice(index, 1);
  }

  const result = flames[0];

  const map = {
    F: "Friends 👫",
    L: "Lovers 💞",
    A: "Attraction 🔥",
    M: "Marriage 💍",
    E: "Enemies 😤",
    S: "Siblings 🌸"
  };

  return map[result];
}

/* =========================
   SAVE TO FIRESTORE
========================= */

async function saveToFirestore(userName, crushName) {

  if (!canSubmitNow()) {

    document.getElementById("status").textContent =
      "⏳ Wait before sending again.";

    return;
  }

  try {

    const user = await ensureAuth();

    if (!user) {

      document.getElementById("status").textContent =
        "Authentication failed.";

      return;
    }

    const docRef = await addDoc(
      collection(db, "submissions"),
      {

        userName: userName.slice(0, 40),

        crushName: crushName.slice(0, 40),

        uid: user.uid,

        createdAt: serverTimestamp(),

        userAgent:
          navigator.userAgent.slice(0, 120)

      }
    );

    markSubmissionTime();

    console.log("Saved:", docRef.id);

    document.getElementById("status").textContent =
      "✅ Saved securely.";

  } catch (err) {

    console.error(err);

    document.getElementById("status").textContent =
      "❌ Save failed.";
  }
}

/* =========================
   BUTTON
========================= */

document
.getElementById("calc-btn")
.addEventListener("click", async () => {

  const userName =
    document
    .getElementById("user-name")
    .value
    .trim();

  const crushName =
    document
    .getElementById("crush-name")
    .value
    .trim();

  if (!userName || !crushName) {

    alert("Enter both names");

    return;
  }

  const result =
    calculateFLAMES(
      userName,
      crushName
    );

  document.getElementById("result").textContent =
    result;

  await saveToFirestore(
    userName,
    crushName
  );

});

</script>

</body>
</html>
